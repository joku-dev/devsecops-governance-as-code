level: GOV
name: Governance Requirements
required_platform_level: Not applicable
requirements:
- id: DSCB-GOV-REQ-001
  domain: applicability
  title: Applicability
  control_objective: Ensure governance obligations for applicability, compliance verification, and deviations are implemented and evidenced.
  requirement: All programs SHALL implement the Level 1 Control Baseline.
  required_platform_level: Not applicable
  platform_capabilities:
  - governance_workflow
  - waiver_registry
  - compliance_reporting
  evidence:
  - program_control_baseline_assignment
  - applicability_assessment_record
  verification:
    method: hybrid
    frequency: governance_review
  policy_as_code:
    candidate: false
    enforcement: governance_review
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
