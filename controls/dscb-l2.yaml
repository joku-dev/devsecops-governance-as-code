level: L2
name: Secure DevSecOps
required_platform_level: PRA-Level 2
requirements:
- id: DSCB-L2-REQ-001
  domain: secure_development_environments
  title: Secure Development Environments
  control_objective: Ensure development environments comply with enterprise security policies.
  requirement: Development environments SHALL be centrally managed.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - central_development_environment_management
  - configuration_baselines
  - secure_developer_workspace
  evidence:
  - environment_configuration_records
  - system_configuration_baselines
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Central management evidence can be checked through endpoint or platform inventory.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Platform inventory or configuration management evidence SHALL show that development environments are centrally managed.
- id: DSCB-L2-REQ-002
  domain: secure_development_environments
  title: Secure Development Environments
  control_objective: Ensure development environments comply with enterprise security policies.
  requirement: Development environments SHALL comply with enterprise security configuration standards.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - central_development_environment_management
  - configuration_baselines
  - secure_developer_workspace
  evidence:
  - environment_configuration_records
  - system_configuration_baselines
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Configuration baseline compliance can be checked through endpoint/configuration evidence.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Development environment evidence SHALL show compliance with the applicable enterprise security configuration baseline.
- id: DSCB-L2-REQ-003
  domain: devsecops_platform_access_control
  title: DevSecOps Platform Access Control
  control_objective: Ensure secure access to DevSecOps platforms.
  requirement: Access to DevSecOps platforms SHALL be controlled through centralized identity management
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - central_iam
  - rbac
  - mfa_privileged_access
  - access_audit_logging
  evidence:
  - authentication_logs
  - access_control_configuration
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Central identity management can be checked through platform configuration.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Platform configuration evidence SHALL show that DevSecOps platform access is integrated with centralized identity
    management.
- id: DSCB-L2-REQ-004
  domain: devsecops_platform_access_control
  title: DevSecOps Platform Access Control
  control_objective: Ensure secure access to DevSecOps platforms.
  requirement: Multi-factor authentication SHALL be enforced for privileged access.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - central_iam
  - rbac
  - mfa_privileged_access
  - access_audit_logging
  evidence:
  - authentication_logs
  - access_control_configuration
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/access_control.rego
  waiver:
    allowed: true
    authority: CISO
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Privileged access without MFA can be detected and blocked.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Privileged access evidence SHALL show that multi-factor authentication is enforced for privileged DevSecOps platform
    roles.
- id: DSCB-L2-REQ-005
  domain: dependency_source_control
  title: Dependency Source Control
  control_objective: Ensure software dependencies originate from trusted repositories.
  requirement: Software dependencies SHALL be retrieved from approved repositories.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - approved_dependency_repositories
  - dependency_proxy
  - external_download_prevention
  evidence:
  - repository_configuration
  - dependency_management_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Approved dependency repository use can be enforced in build configuration.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Build and dependency configuration SHALL show that software dependencies are retrieved from approved repositories.
- id: DSCB-L2-REQ-006
  domain: dependency_source_control
  title: Dependency Source Control
  control_objective: Ensure software dependencies originate from trusted repositories.
  requirement: Direct downloads from external sources SHALL NOT be permitted.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - approved_dependency_repositories
  - dependency_proxy
  - external_download_prevention
  evidence:
  - repository_configuration
  - dependency_management_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/dependency_source_control.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Direct external downloads can be detected in pipelines and build logs.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Pipeline, build, or dependency logs SHALL show that direct downloads from non-approved external sources are not used.
- id: DSCB-L2-REQ-007
  domain: artifact_signing
  title: Artifact Signing
  control_objective: Ensure authenticity of released software artifacts.
  requirement: Software artifacts SHALL be cryptographically signed before release.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - artifact_signing_service
  - signing_key_management
  - signature_verification
  evidence:
  - artifact_signatures
  - signing_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/artifact_signing.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Unsigned artifacts can be blocked before release.
    check_type: integrity
    machine_readable_evidence_required: true
  verification_requirement: Each releasable artifact SHALL provide signature evidence created before release.
- id: DSCB-L2-REQ-008
  domain: artifact_signing
  title: Artifact Signing
  control_objective: Ensure authenticity of released software artifacts.
  requirement: Signing keys SHALL be protected and managed according to enterprise security policies.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - artifact_signing_service
  - signing_key_management
  - signature_verification
  evidence:
  - artifact_signatures
  - signing_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Key protection requires evidence from key management or signing infrastructure.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Signing infrastructure evidence SHALL show that signing keys are protected and managed according to enterprise security
    policy.
- id: DSCB-L2-REQ-009
  domain: infrastructure_as_code
  title: Infrastructure as Code
  control_objective: Ensure infrastructure configuration is controlled and reproducible.
  requirement: Infrastructure used for software deployment SHALL be defined through Infrastructure as Code.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - iac_repository
  - environment_configuration_management
  - iac_validation
  evidence:
  - infrastructure_repositories
  - infrastructure_change_history
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/iac_required.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: IaC presence can be checked through repository and deployment metadata.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Deployment evidence SHALL reference version-controlled Infrastructure as Code definitions for the deployed infrastructure.
- id: DSCB-L2-REQ-010
  domain: infrastructure_as_code
  title: Infrastructure as Code
  control_objective: Ensure infrastructure configuration is controlled and reproducible.
  requirement: Infrastructure definitions SHALL be maintained in version control.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - iac_repository
  - environment_configuration_management
  - iac_validation
  evidence:
  - infrastructure_repositories
  - infrastructure_change_history
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/iac_required.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Version control for IaC can be checked through repository metadata.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Infrastructure definition evidence SHALL show that IaC sources are maintained in version control with change history.
- id: DSCB-L2-REQ-011
  domain: pipeline_security_gates
  title: Pipeline Security Gates
  control_objective: Ensure pipeline security policies are enforced prior to release.
  requirement: DevSecOps pipelines SHALL enforce security gates.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - policy_gate_engine
  - security_threshold_enforcement
  - release_blocking
  evidence:
  - pipeline_policy_gate_records
  - pipeline_execution_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/pipeline_security_gates.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Security gate execution can be enforced in pipeline templates.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Pipeline execution evidence SHALL show that required security gates were executed for the relevant lifecycle stage.
- id: DSCB-L2-REQ-012
  domain: pipeline_security_gates
  title: Pipeline Security Gates
  control_objective: Ensure pipeline security policies are enforced prior to release.
  requirement: Releases SHALL NOT proceed when defined security thresholds are exceeded.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - policy_gate_engine
  - security_threshold_enforcement
  - release_blocking
  evidence:
  - pipeline_policy_gate_records
  - pipeline_execution_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/pipeline_security_gates.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Release can be blocked when thresholds are exceeded without waiver.
    check_type: threshold
    machine_readable_evidence_required: true
  verification_requirement: Release decision evidence SHALL show that releases are blocked when security thresholds are exceeded unless an approved
    waiver exists.
- id: DSCB-L2-REQ-013
  domain: security_monitoring
  title: Security Monitoring
  control_objective: Ensure security-relevant events are monitored.
  requirement: Operational systems SHALL generate security-relevant events.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - security_event_generation
  - security_event_forwarding
  - monitoring_integration
  evidence:
  - security_monitoring_logs
  - security_event_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Security event generation can be checked through logging configuration or telemetry evidence.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Operational system evidence SHALL show that defined security-relevant events are generated.
- id: DSCB-L2-REQ-014
  domain: security_monitoring
  title: Security Monitoring
  control_objective: Ensure security-relevant events are monitored.
  requirement: Security events SHALL be forwarded to monitoring systems.
  required_platform_level: PRA-Level 2
  platform_capabilities:
  - security_event_generation
  - security_event_forwarding
  - monitoring_integration
  evidence:
  - security_monitoring_logs
  - security_event_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Forwarding to monitoring can be checked through logging/monitoring configuration evidence.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Monitoring configuration or telemetry evidence SHALL show that security events are forwarded to approved monitoring
    systems.
