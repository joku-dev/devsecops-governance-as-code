level: L1
name: Enterprise DevSecOps Baseline
required_platform_level: PRA-Level 1
requirements:
- id: DSCB-L1-REQ-001
  domain: traceability
  title: Traceability
  control_objective: Ensure traceability between requirements and implemented software and the corresponding Testcases and Reports.
  requirement: All software components SHALL be traceable to defined system or software requirements and the corresponding Testcases and Reports.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - evidence_and_traceability_layer
  - traceability_database
  - pipeline_audit_logs
  evidence:
  - requirements_traceability_records
  - configuration_management_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Traceability can be checked through ALM, repository, pipeline, and evidence links.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide machine-readable traceability records linking software components to defined
    system or software requirements and corresponding test cases or reports.
- id: DSCB-L1-REQ-002
  domain: source_code_integrity
  title: Source Code Integrity
  control_objective: Ensure integrity and accountability of source code changes.
  requirement: All software source code SHALL be maintained in approved version control systems and changes SHALL be traceable to an identifiable
    author.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - approved_version_control
  - code_review
  - branch_protection
  - repository_audit_log
  evidence:
  - commit_history
  - code_review_records
  - branch_protection_configuration
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Approved VCS and author traceability can be checked through repository metadata.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Each repository SHALL provide machine-readable commit and author metadata showing that source code changes are maintained
    in an approved version control system and attributable to an identifiable author.
- id: DSCB-L1-REQ-003
  domain: source_code_integrity
  title: Source Code Integrity
  control_objective: Ensure integrity and accountability of source code changes.
  requirement: Direct modification of protected branches SHALL be prohibited.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - approved_version_control
  - code_review
  - branch_protection
  - repository_audit_log
  evidence:
  - commit_history
  - code_review_records
  - branch_protection_configuration
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/branch_protection.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Protected branch direct modification is objectively enforceable.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Protected branch configuration SHALL show that direct pushes are disabled and changes require the defined integration
    workflow.
- id: DSCB-L1-REQ-004
  domain: secure_coding_practices
  title: Secure Coding Practices
  control_objective: Reduce introduction of known software vulnerabilities.
  requirement: Secure coding practices SHALL be applied and security-relevant coding errors SHALL be detected during development or testing.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - static_code_analysis
  - code_review
  - secure_coding_guidance
  evidence:
  - static_code_analysis_reports
  - code_review_documentation
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Secure coding cannot be fully judged automatically, but SAST and review evidence can be checked.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each releasable software change SHALL provide secure coding evidence, including configured static analysis results
    and code review records for the applicable technology stack.
- id: DSCB-L1-REQ-005
  domain: software_supply_chain_transparency
  title: Software Supply Chain Transparency
  control_objective: Ensure transparency and control of third-party dependencies.
  requirement: All software dependencies SHALL be identifiable and documented.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - dependency_inventory
  - sbom_generation
  - dependency_scanning
  - evidence_repository
  evidence:
  - sbom
  - dependency_scan_reports
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Dependency inventory can be checked through SBOM or dependency scan evidence.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide a machine-readable dependency inventory or SBOM covering the software dependencies
    included in the artifact.
- id: DSCB-L1-REQ-006
  domain: software_supply_chain_transparency
  title: Software Supply Chain Transparency
  control_objective: Ensure transparency and control of third-party dependencies.
  requirement: A Software Bill of Materials (SBOM) SHALL be generated for releasable artifacts.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - dependency_inventory
  - sbom_generation
  - dependency_scanning
  - evidence_repository
  evidence:
  - sbom
  - dependency_scan_reports
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/sbom_required.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: SBOM presence and artifact linkage can be enforced for release candidates.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide a machine-readable SBOM linked to the releasable artifact identifier.
- id: DSCB-L1-REQ-007
  domain: controlled_build_process
  title: Controlled Build Process
  control_objective: Ensure integrity and reproducibility of software builds.
  requirement: Software builds SHALL be executed through controlled automated pipelines.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - automated_pipeline_execution
  - build_pipeline_logging
  - artifact_versioning
  evidence:
  - build_pipeline_logs
  - artifact_version_identifiers
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Pipeline execution evidence can prove automated builds.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide pipeline execution evidence showing that build activities were executed through
    controlled automated pipelines.
- id: DSCB-L1-REQ-008
  domain: controlled_build_process
  title: Controlled Build Process
  control_objective: Ensure integrity and reproducibility of software builds.
  requirement: Build outputs SHALL be uniquely identifiable.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - automated_pipeline_execution
  - build_pipeline_logging
  - artifact_versioning
  evidence:
  - build_pipeline_logs
  - artifact_version_identifiers
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Artifact identifiers can be checked through artifact metadata.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each build output SHALL provide artifact metadata containing a unique artifact identifier, version, digest, or equivalent
    repository identifier.
- id: DSCB-L1-REQ-009
  domain: vulnerability_identification
  title: Vulnerability Identification
  control_objective: Identify known vulnerabilities in software components.
  requirement: Automated vulnerability scanning SHALL be performed during build or test stages.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - vulnerability_scanning
  - vulnerability_assessment
  - pipeline_evidence_generation
  evidence:
  - vulnerability_scan_reports
  - vulnerability_assessment_documentation
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/vulnerability_gate.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Vulnerability scan presence can be enforced in the pipeline.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each build or release candidate SHALL provide machine-readable vulnerability scan evidence from the build or test
    stage.
- id: DSCB-L1-REQ-010
  domain: vulnerability_identification
  title: Vulnerability Identification
  control_objective: Identify known vulnerabilities in software components.
  requirement: Identified vulnerabilities SHALL be evaluated prior to release.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - vulnerability_scanning
  - vulnerability_assessment
  - pipeline_evidence_generation
  evidence:
  - vulnerability_scan_reports
  - vulnerability_assessment_documentation
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/vulnerability_gate.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Release can be blocked for unacceptable findings without approved waiver.
    check_type: threshold
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide vulnerability assessment evidence showing that identified vulnerabilities were
    evaluated or covered by an approved waiver before release.
- id: DSCB-L1-REQ-011
  domain: artifact_integrity
  title: Artifact Integrity
  control_objective: Ensure software artifacts are protected from unauthorized modification.
  requirement: Releasable software artifacts SHALL be protected against tampering by approved repository integrity controls and cryptographic
    integrity mechanisms such as checksums, digests, or signatures, as applicable to the required control baseline level.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - artifact_repository_integrity
  - checksum_or_digest_records
  - artifact_metadata_management
  evidence:
  - artifact_signature_records
  - artifact_repository_metadata
  - artifact_checksum_or_digest_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
    rule: policies/opa/artifact_integrity.rego
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: immediate
    rationale: Artifact digest, checksum, or signature evidence can be enforced.
    check_type: integrity
    machine_readable_evidence_required: true
  verification_requirement: Each releasable artifact SHALL provide integrity evidence such as checksum, digest, repository integrity metadata,
    or signature linked to the artifact identifier.
- id: DSCB-L1-REQ-012
  domain: artifact_integrity
  title: Artifact Integrity
  control_objective: Ensure software artifacts are protected from unauthorized modification.
  requirement: Artifacts SHALL be uniquely identifiable.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - artifact_repository_integrity
  - checksum_or_digest_records
  - artifact_metadata_management
  evidence:
  - artifact_signature_records
  - artifact_repository_metadata
  - artifact_checksum_or_digest_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Artifact identity can be checked through repository metadata.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each artifact SHALL provide repository metadata proving a unique and stable artifact identity.
- id: DSCB-L1-REQ-013
  domain: release_authorization
  title: Release Authorization
  control_objective: Ensure controlled and authorized software release.
  requirement: Deployment of software artifacts SHALL require authorized approval.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - release_approval_workflow
  - deployment_logging
  - approved_artifact_selection
  evidence:
  - release_approval_records
  - deployment_logs
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Release approval evidence can be checked through workflow or environment approvals.
    check_type: approval
    machine_readable_evidence_required: true
  verification_requirement: Each deployment or release candidate SHALL provide approval evidence linked to the artifact, release, or deployment
    record.
- id: DSCB-L1-REQ-014
  domain: release_authorization
  title: Release Authorization
  control_objective: Ensure controlled and authorized software release.
  requirement: Only approved artifacts SHALL be deployed.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - release_approval_workflow
  - deployment_logging
  - approved_artifact_selection
  evidence:
  - release_approval_records
  - deployment_logs
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Deployment can be blocked when artifact approval evidence is missing.
    check_type: approval
    machine_readable_evidence_required: true
  verification_requirement: Deployment evidence SHALL show that only artifacts with approved release status were deployed.
- id: DSCB-L1-REQ-015
  domain: pipeline_evidence_generation
  title: Pipeline Evidence Generation
  control_objective: Ensure compliance evidence is automatically generated.
  requirement: DevSecOps pipelines SHALL generate machine-readable evidence artifacts for implemented controls.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - machine_readable_evidence_generation
  - pipeline_audit_logs
  - evidence_repository
  evidence:
  - pipeline_execution_logs
  - security_scan_reports
  - artifact_metadata
  - approval_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Machine-readable evidence bundle presence can be checked.
    check_type: presence
    machine_readable_evidence_required: true
  verification_requirement: Each pipeline execution SHALL produce a machine-readable evidence bundle covering the implemented controls applicable
    to the pipeline stage.
- id: DSCB-L1-REQ-016
  domain: operational_traceability
  title: Operational Traceability
  control_objective: Ensure deployed software versions can be traced in operation.
  requirement: Operational environments SHALL maintain records of deployed software versions and relevant security events.
  required_platform_level: PRA-Level 1
  platform_capabilities:
  - deployment_records
  - operational_logging
  - incident_record_repository
  evidence:
  - system_logs
  - deployment_records
  - incident_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Operational version and security event records can be checked through deployment and logging integrations.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Each operational deployment SHALL provide records linking deployed software versions to deployment records and relevant
    security or incident events.
