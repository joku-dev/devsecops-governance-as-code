level: L3
name: Trusted Software Supply Chain / SDD
required_platform_level: PRA-Level 3
requirements:
- id: DSCB-L3-REQ-001
  domain: deterministic_builds
  title: Deterministic Builds
  control_objective: Ensure reproducible software builds.
  requirement: Software builds SHALL be reproducible using identical source code and build configuration.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - reproducible_build_verification
  - version_controlled_build_configuration
  evidence:
  - rebuild_verification_records
  - build_configuration_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: future
    rationale: Reproducible build verification can be automated after deterministic build tooling is established.
    check_type: integrity
    machine_readable_evidence_required: true
  verification_requirement: Rebuild verification evidence SHALL show that the same source code and build configuration can reproduce the expected
    build output within defined tolerance.
- id: DSCB-L3-REQ-002
  domain: deterministic_builds
  title: Deterministic Builds
  control_objective: Ensure reproducible software builds.
  requirement: Build configurations SHALL be version controlled.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - reproducible_build_verification
  - version_controlled_build_configuration
  evidence:
  - rebuild_verification_records
  - build_configuration_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: immediate
    rationale: Build configuration version control can be checked through repository metadata.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Build configuration evidence SHALL show that build definitions are maintained in version control and linked to the
    build execution.
- id: DSCB-L3-REQ-003
  domain: build_environment_isolation
  title: Build Environment Isolation
  control_objective: Ensure build environments are protected against manipulation.
  requirement: Software builds SHALL be executed in isolated build environments.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - isolated_build_environment
  - recreatable_build_environment
  evidence:
  - build_environment_configuration
  - pipeline_execution_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Build environment isolation can be checked through runner/container evidence.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Pipeline evidence SHALL show that builds are executed in isolated build environments.
- id: DSCB-L3-REQ-004
  domain: build_environment_isolation
  title: Build Environment Isolation
  control_objective: Ensure build environments are protected against manipulation.
  requirement: Build environments SHALL be recreated for each pipeline execution.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - isolated_build_environment
  - recreatable_build_environment
  evidence:
  - build_environment_configuration
  - pipeline_execution_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Recreated build environments can be checked through pipeline environment metadata.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Pipeline environment evidence SHALL show that build environments are recreated for each controlled pipeline execution.
- id: DSCB-L3-REQ-005
  domain: dependency_provenance
  title: Dependency Provenance
  control_objective: Ensure verifiable origin of software dependencies.
  requirement: Software dependencies SHALL include verifiable provenance information.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - provenance_capture
  - trusted_dependency_sourcing
  - dependency_records
  evidence:
  - provenance_metadata
  - dependency_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: future
    rationale: Dependency provenance requires provenance-capable tooling and metadata.
    check_type: provenance
    machine_readable_evidence_required: true
  verification_requirement: Dependency metadata SHALL provide verifiable provenance information for dependencies used in the build.
- id: DSCB-L3-REQ-006
  domain: dependency_provenance
  title: Dependency Provenance
  control_objective: Ensure verifiable origin of software dependencies.
  requirement: Dependency provenance SHALL be recorded during the build process.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - provenance_capture
  - trusted_dependency_sourcing
  - dependency_records
  evidence:
  - provenance_metadata
  - dependency_records
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: future
    rationale: Build-time provenance recording requires provenance capture tooling.
    check_type: provenance
    machine_readable_evidence_required: true
  verification_requirement: Build evidence SHALL record dependency provenance metadata during the build process.
- id: DSCB-L3-REQ-007
  domain: trusted_artifact_signing
  title: Trusted Artifact Signing
  control_objective: Ensure artifacts are signed using enterprise-managed trust infrastructure.
  requirement: Software artifacts SHALL be signed using enterprise signing infrastructure.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - enterprise_trust_infrastructure
  - central_signing_key_management
  - artifact_signature_logs
  evidence:
  - signing_infrastructure_records
  - artifact_signature_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: true
    enforcement: automated_gate
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: blocking_gate
    maturity: tool_integration_required
    rationale: Enterprise signing infrastructure can enforce artifact signing.
    check_type: integrity
    machine_readable_evidence_required: true
  verification_requirement: Artifact signature evidence SHALL show that released artifacts are signed using enterprise signing infrastructure.
- id: DSCB-L3-REQ-008
  domain: trusted_artifact_signing
  title: Trusted Artifact Signing
  control_objective: Ensure artifacts are signed using enterprise-managed trust infrastructure.
  requirement: Signing keys SHALL be centrally managed.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - enterprise_trust_infrastructure
  - central_signing_key_management
  - artifact_signature_logs
  evidence:
  - signing_infrastructure_records
  - artifact_signature_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Central key management is evidenced by signing infrastructure configuration.
    check_type: configuration
    machine_readable_evidence_required: true
  verification_requirement: Trust infrastructure evidence SHALL show that signing keys are centrally managed.
- id: DSCB-L3-REQ-009
  domain: end_to_end_traceability
  title: End-to-End Traceability
  control_objective: Ensure traceability across the complete software lifecycle.
  requirement: Traceability SHALL exist between requirements, source code, verification Cases / Procedures and Test result, build artifacts, and
    deployed software.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - end_to_end_traceability
  - deployment_metadata
  - evidence_graph
  evidence:
  - traceability_records
  - deployment_metadata
  verification:
    method: hybrid
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: future
    rationale: End-to-end traceability can be graph-checked after ALM/repo/pipeline integration.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: Each release candidate SHALL provide end-to-end traceability evidence linking requirements, source code, verification
    results, build artifacts, deployment metadata, and deployed software.
- id: DSCB-L3-REQ-010
  domain: runtime_integrity_verification
  title: Runtime Integrity Verification
  control_objective: Ensure operational systems verify software integrity.
  requirement: Runtime environments SHALL verify the integrity of deployed software artifacts.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - runtime_integrity_verification
  - deployment_traceability
  evidence:
  - runtime_integrity_verification_logs
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: CISO
  automation:
    type: evidence_check
    maturity: future
    rationale: Runtime integrity verification requires runtime attestation or verification telemetry.
    check_type: integrity
    machine_readable_evidence_required: true
  verification_requirement: Runtime evidence SHALL show integrity verification results for deployed software artifacts.
- id: DSCB-L3-REQ-011
  domain: continuous_compliance_evidence
  title: Continuous Compliance Evidence
  control_objective: Ensure DevSecOps pipelines produce compliance evidence automatically.
  requirement: DevSecOps platforms SHALL generate machine-readable compliance evidence for lifecycle activities.
  required_platform_level: PRA-Level 3
  platform_capabilities:
  - continuous_compliance_evidence
  - compliance_evidence_repository
  - pipeline_audit_logs
  evidence:
  - compliance_evidence_repository
  - pipeline_audit_records
  verification:
    method: automated
    frequency: release_candidate
  policy_as_code:
    candidate: false
    enforcement: evidence_check
  waiver:
    allowed: true
    authority: DevSecOps Governance Board
  automation:
    type: evidence_check
    maturity: tool_integration_required
    rationale: Continuous compliance evidence can be checked through evidence repository completeness.
    check_type: linkage
    machine_readable_evidence_required: true
  verification_requirement: The DevSecOps platform SHALL provide machine-readable compliance evidence covering lifecycle activities and linked
    control identifiers.
