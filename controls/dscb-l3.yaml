level: L3
name: Trusted Software Supply Chain / SDD
required_platform_level: PRA-Level 3
requirements:
  - id: DSCB-L3-REQ-001
    domain: deterministic_builds
    title: Reproducible builds
    requirement: Software builds SHALL be reproducible using identical source code and build configuration.
    required_platform_level: PRA-Level 3
    platform_capabilities:
      - reproducible_build_verification
      - version_controlled_build_configuration
    evidence:
      - rebuild_verification_record
      - build_configuration_record
    verification:
      method: hybrid
      frequency: release_candidate
    policy_as_code:
      candidate: true
      enforcement: release_gate
    waiver:
      allowed: true
      authority: DevSecOps Governance Board

  - id: DSCB-L3-REQ-010
    domain: runtime_integrity_verification
    title: Runtime integrity verification
    requirement: Runtime environments SHALL verify the integrity of deployed software artifacts.
    required_platform_level: PRA-Level 3
    platform_capabilities:
      - runtime_integrity_verification
      - deployment_traceability
    evidence:
      - runtime_integrity_verification_logs
    verification:
      method: automated
      frequency: runtime
    policy_as_code:
      candidate: true
      enforcement: runtime_gate
    waiver:
      allowed: true
      authority: CISO
